參木神膽星丹參半夏遠志柏子仁白芍秫米龍齒夜交藤會皮龍眼肉竹茹案邱左五十一遺泄目前不發封藏早虧遂致諸虛雜出肝藏魂又主風心藏神又主血諸竅出風畏光怕亮胸脘之間氣攻無度脈沉弦擬馴龍雷而靜肝陽洋參木神玳瑁白蒺藜半夏海貝齒鉤藤潼蒺藜秫米白芍夜交藤丹參龍眼二竹茹三十九蟲積案劉左十二脘腹作痛甚於臍眼擾上為嘔下便如膿防成內癰之勢幼年食積為多常常痛者為滯作陳痛者為蟲脈息細弦治以疏和洋參蕪荑鶴蝨一錢五分楂炭敗醬草雞金左金丸白芍川楝使君米仁陳皮棐子肉案王左十蟯蟲鬱於腸現發癢蟲出治以苦化珠兒參炒黃柏使君槐米小川連炒知母烏梅八分川楝炒黃芩山梔生草會皮棐子肉七粒四十崩漏案右崩勢稍定尚零零落落紅白交見奇經大損肢酸腹痛治以和養阿膠香附龍骨沙苑艾葉夏曲牡蠣側柏黨參白芍棕炭會皮紅棗案右漏經三月腰痠腹痛心跳頭蒙種種營虧氣痹脈見沉弦治以和補阿膠血餘木神白芍黨參陳棕龍骨側柏香附楂炭丹參會皮焦荷蒂紅棗案梅右奇經不攝崩放後又為經漏應月淋漓營陰大傷諸虛雜出頭眩耳鳴心悸腰楚脈見弦滑治以和養阿膠血餘木神杜仲黨參陳棕龍骨白芍香附蓮房炭炮薑炭新會側柏另服吉林須紅棗案高右老年崩放綿延未止脈息濡細沖海不攝氣營兩虧肢腰痠楚治以和養阿膠血餘木神杜仲黨參陳棕龍骨沙苑香附蓮房炭白芍新會側柏復崩放減而未止向有失血老年營陰不攝內絡已損脈見芤細炎夏急宜調和阿膠血餘木神白芍黨參陳棕龍骨杜仲香附蓮房繭炭會皮側柏藕節案右操勞過度有傷奇經經漏三月綿延不止以致統藏不攝血海愈涸脈見細弦當溫養八脈兼補氣血栽培火土以固其根本涵養乙癸以充其淵源俾得天癸有恆陰順陽和為法安肉桂去粗皮後入艾絨木神赤石脂醋煅包煎陳阿膠蒲黃炭炒血餘龍骨杜仲黨參陳棕白芍會皮棗四十一停經案右停經見紅多日不止恐至偏産而為崩漏治以和養大生地白芍木神杜仲雞血膏八分香附川斛沙苑炒當歸艾絨新會料豆藕節炭二枚棗案右停經見紅數月未止似小産而不下頭眩腰痛腹亦迸痛治以和養生地白芍木神川楝雞血藤香附沙苑荊芥當歸艾絨料豆新會荷蒂棗四十二調經案右常常氣怯神倦屬中氣受傷失於砥柱遂致肝陽內擾頭眩耳鳴月事反為趲前女科以肝為先天皆以營陰失養氣無以攝脈見濡細舌膩擬輕重調補洋參寄生杜仲佛花法半夏木神丹參玉蝶白芍遠志米仁會皮竹茹棗案王右月事早而且多每每零落不止且帶下淋漓奇經久為不攝以致頭眩耳鳴脈見細弦左關尺俱澀擬以和養洋參白芍佛花丹參元生地木神玉蝶烏鰂夏曲龍骨川斛會白側柏棗案竇右當脘作痛頭眩腰楚脈息細弦治以疏和兼調月事腹痛香附煨木香木神茺蔚子當歸艾絨遠志延胡索白芍丹參杜仲會皮絲瓜絡案楊右營虧氣痹奇經失職月事不調衍後為多且少色澤營失養肝肝氣轉為充斥侮中則腹部攻痛入絡則兩乳發脹甚至晨起為之發嘔脈見細弦擬以調養香附法半夏寄生合歡雞血膏木神茺蔚杜仲當歸遠志白芍會絡絲瓜絡代代花楊復月事衍後漸得准期惟逢月之前或為腹脹或為腰楚脈見弦滑營虧氣痹再從和養香附木神阿膠茺蔚子雞血膏遠志杜仲佛手當歸白芍沙苑新會絲瓜絡隨服吉林須案林右每經淋漓不淨小腹發迸筋骨痠軟屬氣不調營營陰失守擬以調氣和陰香附木神酒紅花四分延胡當歸丹參炒川芎八分川斷茺蔚白芍淮膝新會砂仁案劉右經事向來後期忽又先期總由衝任不攝未能生育脈見細弦治以和養香附丹參夏曲料豆當歸川芎杜仲銀柴白芍艾絨川斷新會絲瓜絡案右氣痹營滯腹部脹滿經事五月未行脈見弦滑治以和養香附木神茺蔚陳櫞夏曲遠志延胡會皮丹參佛手玉蝶當歸砂仁案右經事不調或一二月一行或四五月一行營滯由於氣痹脘脹腰楚形黃肢腫脈息濡細治以疏和香附木神茺蔚川斷夏曲遠志延胡杜仲丹參新會川芎當歸月季花一朵西砂仁案王右三十八肌灼腹滿經事七月未行脈見弦數擬以疏和香附木神茺蔚丹參當歸遠志白芍杜仲銀柴淮膝陳櫞會皮鹽水炒砂仁四分
