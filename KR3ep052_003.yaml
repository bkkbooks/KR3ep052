body:
  text: 卷下一咽喉案張左喉閉較通蒂丁未曾收斂肝肺不和脈見細弦鬱熱尚未清楚汗出津津擬從和養洋參杏仁川斛橄欖核燕根川貝茯苓生草冬蟲蛤殼白芍新會枇杷葉棗案左將成喉痹咽哽音嘶脈見弦滑治以和養沙參柿霜淡秋石蜜桑葉杏仁蛤殼茯苓橄欖核川貝瓜蔞仁白芍冬瓜子沖枇杷膏三錢案夏左二十九疙瘩紅腫肺腎陰傷鬱熱挾痰為之上下不攝甚至溺多色黃夜寐不寧龍雷之勢有升少降夏令與病不合恐失血失音脈見細弦急宜調護沙參柿霜白歸鬚茯苓杏仁燕根料豆生草川貝元參白芍會皮沖雞子清一枚案張左濕去熱存陰分受傷咽喉為之痛哽得飲沖鼻肺陰傷而蒂丁病擬以清降沙參柿霜茯苓蜜桑葉杏仁全福通草橄欖核川貝代赭新會冬瓜子枇杷葉案右喉痹將成頭眩肢麻病情太多治以清泄杏仁大黑豆蜜桑葉川斛川貝女珍杭菊白芍柿霜花粉新會生草枇杷葉案張左四十四失血後咳肺陰大傷咽為外候且哽且痛漸成喉痹脈見細弦治以和養沙參柿霜冬蟲石斛甜杏全福元參冬瓜子川貝石英蛤殼白芍沖雞子清一枚棗二失音案李左六十六示及咳嗽略減痰多而薄咽喉作痛吃緊尤在失音諸證起鬱怒之後顯系肝邪刑肺肺失清肅考發音之源有三心為其主腎為其根肺為其戶也失音之證有二暫則為金實無聲久則為金破不鳴也如現在病僅匝月暫而非久當是金實為多實非外邪之謂由向來嗜飲痰與熱從內而生乘肝之升上郁肺臟音戶遂為失宣擬清養肝肺以和本分化痰熱以治標録方即候政行桑葉扎馬勃南沙參蟬衣川貝杭菊橄欖核冬瓜子蛤殼杏仁茯苓枳椇仁枇杷葉沖肺露茅根肉去心三錢蘆衣一方案左嗜飲傷肺痰熱內阻咽為之外候痰擾為腫熱熾為哽將成喉痹脈息弦滑擬以清化桑葉杏仁扎馬勃炒淮膝川貝冬瓜子茯苓南沙參蛤殼杭菊橄欖核枳椇仁荸薺去皮二枚漂淡海蜇一兩案楊左治咽紅髮哽脈息浮弦桑葉象貝蟬衣南沙參杏仁蔞仁馬勃杭菊蛤殼茯苓金果欖山豆根枇杷葉以上金實無聲者案王左咳嗽綿延咽哽發嘔音嘶痰少脈見細弦陰傷氣痹治以和養北沙耆皮全福杏仁柿霜冬蟲石英會白百藥煎包八分川貝白芍生草枇杷葉棗案沈左咳嗽失音虛而非實屬金破不鳴脈見細弦肺腎兩為失司音之根聲之戶受傷非淺擬以和降沙參杏仁蔞仁麥冬綿耆川貝薤白百合柿霜茯苓蛤殼白及片一錢五分枇杷葉生竹茹蘆衣沖肺露以上屬金破不鳴者三癇風痰案俞左五十四風痰互擾肢骱抽搐面麻舌強甚則神迷跌僕屬五癇之一脈弦且滑治以熄化杭菊白蒺藜木神竹瀝夏殭蠶雙鉤遠志丹參梧桐花膽星寄生全蠍去毒四分水炒竹茹絲瓜絡復癇厥有根不發時舌亦為強肢麻頭脈見弦滑再從熄風化痰杭菊菖蒲木神竹瀝夏殭蠶雙鉤遠志天竹黃梧桐花膽星寄生路路通絲瓜絡沖功勞葉露三錢案徐左十癇厥有根發時神迷手痙目瞪口呆喉似曳鋸脈來弦滑當熄風化痰以冀除根青礞石細菖木神蒺藜杭菊雙鉤遠志路路通殭蠶膽星龍齒新會竹二青案王左十八豬癇屢發喉鳴痰響項斜肢痙脈見細弦從中驚痰入絡急擬開降礞石雙鉤木神竹瀝夏杭菊膽星龍齒白芍細菖珠母粉丹參會皮洋青鉛炒竹茹四癇不寐案徐左癲癇復發仍言語喃喃有時默默徹夜不寐脈見細弦屬痰熱內蒙機關失利治以鎮養磁石辰砂拌木神膽星石決宋夏遠志夜交藤白芍秫米丹參玳瑁八分會皮玫竹茹洋青鉛復界乎癲癇之間有根屢發發則神迷喉鳴言語反常屬痰邪矇蔽機關脈弦滑擬鎮養先冀艱寐得和磁珠丸煎入木神膽星杭菊半夏遠志夜交藤白芍秫米丹參珠母會皮二竹茹五癇厥案鄭左十四癇厥不平輕發神志模糊重發手足顫動一日數十次甚至身熱胃呆脈息弦細治以鎮養羚羊木神玳瑁洋參石決珠母龍齒會皮杭菊桑葉膽星細菖白蒺藜雙鉤白芍竹茹鐵花又末服方珠粉一分犀黃五釐琥珀二分辰砂一分川貝四分天竹黃二分上味共研細末每服二分竹瀝夏一兩再加開水沖服六癲案金左四十二陽並於陰為癲癲象有根每發神呆目瞪當脘懊憹言語亦為錯落脈見弦滑擬以開降半夏木神路路通杭菊細菖遠志會皮白芍膽星丹參炒當歸炒枳實炒竹茹龍虎丸一丸另沖服案右治癲症將成神呆不語半夏木神礞石路路通膽星遠志天竹黃會皮細菖丹參殭蠶開口椒八分竹茹玫炒案範左癲厥屢發口吐白沫手痙目瞪痰邪入絡心陰不足肝火有餘脈見弦數擬以清降洋參木神白芍遠志膽星龍齒半夏丹參細菖元精秫米新會絡絲瓜絡路路通荷邊七頭痛案張左三十四冷水洗面已近月餘遂致寒傷於腦頭痛不已治以分解兼顧脘悶肢酸防風蔓荊子一錢五分米仁佛手北細辛四分佩蘭小朴建曲香白芷四分雞蘇散半夏會皮荷葉八河白案左治寒熱食葷肢腹浮腫將成河白防己車前大豆卷通草紫浮萍一錢五分澤瀉防風野赤豆連皮苓萆薢建曲會皮地栗干陳麥柴案張左五歲肢腹浮腫將成河白急宜分疏防己澤瀉米仁川桂枝浮萍萆薢地枯樓三錢建曲連皮苓防風通草赤豆地栗干案範左五歲寒濕互擾幼年謂之河白又名腫脹脈見細弦治以疏導白朮川楝陳櫞皮粉豬苓一錢五分枳實白芍車前澤瀉建曲會皮萆薢香附砂仁地栗干九黃疸案孫左草七黃疸漸成形黃脘悶脈見細弦治以疏和焦茅朮一錢五分米仁炒蔞皮川斛炒黃芩佩蘭新會防己細茵陳半夏茯苓萆薢竹茹十汗案左自汗盜汗久而未止脈見細弦治以固養耆皮木神秦艽夏曲防風龍骨鱉甲丹參麻黃根一錢五分牡蠣白芍會皮淮麥棗十一損病龜胸案何左十六龜胸屬於損病潛滋暗長日後背亦發彎內虛內熱擬以清養青蒿子鱉甲雞金會絡寄生建曲秦艽當歸川斛白芍茯苓知母去毛棐子肉七粒絲瓜絡十二癧案徐右草六屢屢內熱咳嗆頻仍熱復蒸痰痰流於絡頸項左右皆有結核脈見細數治以清養洋參海粉一錢川斛淡昆布一錢五分夏枯杏仁銀柴白芍川貝冬瓜子冬蟲蛤殼海蜇荸薺案左稟體陰虛鬱熱蒸痰阻於絡脈項筋牽引結核雖小久而成癧脈見細弦治以清養洋參海粉海藻會絡夏枯炒殭蠶昆布木神川貝寄生杭菊竺黃絲瓜絡案右久有結核發於耳後屬少陽部位陽亢火化煅凝成痰痰流於絡以致潰久不斂屢屢抽搐外瘍由內因而發諸恙因之蜂集有時頭痛有時耳鳴面為之赤目為之花脈見弦滑擬以清化洋參元精寄生海粉夏枯木神女珍杭菊川貝龍齒白芍會絡漂淡海蜇一兩去皮荸薺二枚案徐右復咳嗆略減項核較軟再從清熱化痰洋參蛤殼海藻杏仁夏枯銀柴昆布石斛川貝杭菊會絡秋石海蜇荸薺女珍案右經事久為不調後期而少營虛生熱熱復蒸痰阻於少陽部分耳後結核漸形脹大防成十八癧之一脈見沉弦擬以和養當歸木神香附青皮夏枯遠志延胡會皮川貝殭蠶丹參杭菊竹茹絲瓜絡案左馬刀現將穿潰余者皆欲成未成體虛挾熱熱則生痰流於絡脈堅紅而痛擬以宣化夏枯料豆會絡茯苓川貝女珍白芍冬瓜子石斛殭蠶生草杏仁絲瓜絡十三消渴案右飲一溲二上渴下消從此肉落肌灼脈數舌紅治以清養洋參料豆煨石膏桑螵蛸生地女珍木神白芍麥冬石斛牡蠣陳皮棗糯米三錢復消渴綿延飲水無度溺亦無度脈數擬清上以和陰攝下以固竅洋參料豆石斛螵蛸生地女珍寒水石三錢白芍麥冬淡天冬牡蠣蓮鬚棗案左飲一溲二漸成消渴脈象濡細治以和養生綿耆蜜炙螵蛸牡蠣蓮鬚沙參木神白芍川斛覆盆龍骨料豆麥冬棗案朱左草五飲一溲二將成消渴脈右細左弦治以和養綿耆木神川斛桑螵蛸蜜炙沙參龍骨會皮料豆覆盆白芍炒菟絲制萸肉棗按上二症屬氣虛消渴故重在上升下攝十四鵝雪疳案王左十六鵝雪疳治以宣化萹蓄川黃柏萆薢瞿麥肥知母去毛茯苓黑山梔甘草梢會皮竹心十五棉花瘡案全左肺脾受毒棉花瘡生生化化遍體皆到脈見細弦腎囊發脹淋濁雖止近發寒熱郁邪上攻下注有不得了之勢羚羊片山梔會核大力子桑葉黃柏荔核生草粉丹皮知母楂核緑豆衣絲瓜絡十六流火案張左六十三流火紅腫溢膿未透形寒脈細治以疏托羌活川牛膝歸鬚防風防己生草大力西赤芍萆薢忍冬藤案葉右三十三流火堅腫脈見沉弦恐其發頭穿潰防己牛膝米仁皮苓獨活青木香萆薢桐皮當歸加皮滑石桑梗絲瓜絡十七發背案陸左草八背疽騎梁已重又在肺俞之處暑濕內郁最恐界限不分痛腐不高容易內陷急宜宣托綿耆當歸生草炙甲片大力玉桔梗四分枸杞青皮會皮角針八分案陸左三十一騎梁發背紅暈四散中腐色青屬半陰半陽脈見細弦險重之至生綿耆鹿角霜茯苓殭蠶甘杞小朴大力青皮會皮藕節絲瓜絡十八流注案左流注三處曲池已潰腋下臂上亦欲蒸膿脈見細弦治以宣化羌活赤芍象貝大力桔梗生草青皮歸尾會皮絲瓜絡案褚左流注潰處不一現在兩眼未收瘡由虛發營液從此受傷兩足軟弱絡脈拘攣脈見弦滑治以和養洋參當歸川斛白芍料豆杜仲木瓜牡蠣女珍寄生淮膝新會絲瓜絡案左痰注不一眼細中空久而不斂漸至營衛受傷營爭為寒衛爭為熱寒熱頻仍防成瘡勞脈見弦滑治以和養洋參石斛當歸白芍耆皮料豆銀柴丹參防風女珍青蒿子會皮絲瓜絡棗案右産後新血已傷舊瘀入絡左腹旁結塊有形防成敗瘀流注脈左細右弦治以疏和香附九香蟲獨活杜仲川楝當歸寄生銀柴白芍淮膝會皮青皮絲瓜絡十九流痰案陳右十六右肩流痰身熱納微防天熱難支脈見細弦治以宣化炙麻黃大力生草元生地歸鬚茯苓青皮白芥會皮絲瓜絡復右肩流痰高腫色紅勢難消退綿耆石斛大力炙甲片歸鬚生草小青皮白芥會皮絲瓜絡案左流痰發於臂部高腫色變勢難消退脈見弦滑治以疏和獨活蠶沙當歸防己寄生大力赤芍萆薢竹瀝夏青皮青木香會皮絲瓜絡案左腰為腎府腎俞流痰蒸膿已熟勢將穿潰所恐者納呆肉削元氣難支潞黨參甲片會皮葛根綿耆當歸大力茯苓青皮半夏生草生白朮細角針案左環跳流痰高腫之勢漸滋暗長久防蒸膿穿潰脈見細弦治以疏化獨活竹瀝夏當歸杜仲寄生蠶沙赤芍會皮洋參大力青皮生草絲瓜絡案左環跳流痰筋骨發赤成則纍月難痊治以疏和竹瀝夏萆薢大力防己芥子青木香九制熟地石斛會絡黃芩絲瓜絡案沈右二十九身熱脘悶環跳腫痛防成流痰脈見沉弦治以疏降羌活青皮防己生苡防風牛膝會皮赤苓大力赤芍益元散歸尾荷葉案左膻中流痰久潰未收中孔甚大漸至本元更傷連次失血又為咳嗽脈見細澀陰傷氣痹內外證皆屬損象早宜護持旱蓮全福沙參杏仁白芍石英料豆川貝象牙屑會皮女珍丹參絲瓜絡枇杷葉二十股陰毒案左股陰毒右面結核按之作痛步履皆為不利屬氣痹凝痰痰流於絡治以疏和獨活赤芍竹瀝夏淮膝桑梗歸尾防己萆薢蠶沙大力天仙藤新會絲瓜絡案張右三十八股陰毒潰膿孔深筋絡先傷半身抽搐疼痛因瘡成病氣逆汗多心悸神疲納微發嘔大便失行脈見濡細勢防痙變洋參木神全福米仁川石斛龍齒川貝淮麥白芍丹參女珍會紅絲瓜絡案李右三十四股陰高腫將成流痰脈見弦細治以疏和當歸竹三七杏仁寄生生牛膝仙鶴草赤芍瓦楞防己青皮丹參昆布絲瓜絡藕節案張右三十八復股陰外收未全小便仍膿防成小腸癰急宜調護沙參茯苓白芍川斛料豆米仁牡蠣會皮女珍敗醬草三錢川貝草梢藕節絲瓜絡二十一膝眼癰案陶左十一