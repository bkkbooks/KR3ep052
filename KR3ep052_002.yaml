己炒知母羚羊威靈仙秦艽會皮絲瓜絡案左楊梅風肢酸神疲郁邪入於肝腎營氣兩傷內風煽爍治以和養羚羊當歸萆薢炒杜仲寄生秦艽木瓜石決龜板威靈白芍會皮絲瓜絡三十五耳聾案王左十五稟體內熱挾風鬱濕清竅矇蔽右耳失聰有時流膿有時痛脹脈見弦滑擬以疏和杭菊料豆細菖蒲八分米仁桑葉女珍炒天蟲三錢雞蘇散青蒿子川斛路路通一錢五分新會青蔥管五寸案何左草一風邪挾濕兩耳為聾脈見沉弦治以和養杭菊路路通元精石生白芍桑葉鉤藤大力子茯苓細菖蔓荊子陳皮白蒺藜去刺荷邊青蔥管案左右耳失聰有時雷鳴屬內虛挾濕治以和養桑葉魚腦石木神川貝芝麻白蒺藜遠志路路通菖蒲鉤藤白芍料豆荷葉以上乃耳鳴屬實者案朱左三十八頭蒙漸減耳仍鳴響脈見弦滑治以清養元精石木神甘杞白蒺藜白芍龍骨菊花潼蒺藜料豆新會丹參杏仁荷邊案王左三十四下疳受傷肝腎之陰不足耳為腎竅肝陽上擾頭部鳴響兩耳漸為失聰脈見弦滑治以清養洋參料豆木神龜板元精女珍貝齒桑葉白芍菊花新會芝麻洋青鉛案朱右四十七頭痛多年漸致耳鳴目花頸項牽引木旺者必侮土有時脘痛納呆脈見沉弦治以和降元精木神杭菊杜仲白芍龍齒雙鉤佛柑半夏寄生白蒺藜新會荷邊絲瓜絡青鉛以上耳鳴響屬虛者三十六耳聤案周右五聤者膿分五色總名謂之耳聤現在並無血出青膿白膿交溢腦髓受傷肝陽為熾漸至頰車閉而難開頸項頭目皆牽引為痛清空之虛難於著枕脈見細弦體本豐腴內痰與內風有升少降擬以鎮養洋參木神潼蒺藜白芍杭菊龍齒白蒺藜象牙屑魚腦石丹參殭蠶料豆荷邊案周右耳聤溢血血止又復溢膿膿薄如水或多或少以致清空受傷頭部鳴響兩額作痛牽連諸虛喉痹哽痛脘悶納少有時腹痛有時便溏脈見弦滑治以和養洋參白芍象牙屑白蒺藜杭菊木神貝母廣橘葉魚腦石龍齒金斛合歡皮荷邊橄欖核一錢五分三十七耳菌案孫左耳菌潰爛膿血交溢久防失聰脈見細弦治以清化石決明桑葉炒川柏赤苓杭菊連翹炒澤瀉滑石炒天蟲炒丹皮炒米仁會皮卷竹心三十八目疾案左兩目蒙赤屬肝風所致擬以鎮養石決明穀精草連翹心白蒺藜桑葉秦艽元精石鉤藤青葙子夜明砂料豆蕤仁霜辰燈心荷邊案左目屬肝竅眼眶上下發紅屬脾濕肝風所致脈象細弦治以清泄沙參川斛料豆丹參桑葉秦艽女珍米仁草決明新會白白芍茯苓卷竹心三十根荷葉案左頭痛未止目仍蒙赤脈見細滑擬從熄養石決木神元精生地雙鉤桑葉龍齒草決料豆胡麻杭菊白蒺藜白芍荷邊三十九咬牙疳案陳右咬牙疳滿口腐爛並有寒熱治以分泄豆豉大力銀花桑葉芥穗防風薄荷殭蠶生草荷葉案趙左咬牙疳滿口腐爛兩腮痛脹脈見浮滑溫毒客於上焦治以清泄豆豉大力連翹射干桑葉荊芥銀花防風薄荷殭蠶象貝母通草荷葉四十牙疳案左腿部青色退而未盡現在牙疳腐爛或輕或重總未平復脈見數滑舌滑膩擬清陰而化濕熱洋參杭菊茯苓料豆川斛南花粉綿茵陳生苡米二至丸肥知母會絡防己白茅花白燈心四十一舌疳案馮右三十一營陰不足氣火有餘中焦積濕與火互擾煽爍陰液舌上似疳非疳脫破作痛屬無外感之邪由內因之熱洋參黃芩金斛會白女珍茵陳翹心生草料豆米仁茯苓通草鮮蘆根去節八錢四十二重舌案左重舌形小而尖現在舌底脹大屢破涎血浮胖時平時作久恐成為郁毒堅結翻大即屬難治早有腹膨作瀉轉而上擾心脾為患挾濕火內燃治以宣化沙參杏仁桑葉丹參天竹黃川貝淡竹葉會白瓦楞冬瓜子白芍茯苓枇杷葉復痰色屢破屢結血水或裹痰涎心脾部位無非鬱熱蒸痰脈息細弦治以和養洋參翹心木神生草天竹黃象貝遠志緑豆衣瓦楞料豆白芍會皮枇杷葉四十三牙宣案高左十八稟體虛熱牙宣溢血旋平旋覆寒熱頭疼有感即來脈見細弦擬以疏和洋參旱蓮桑葉蜜炙白蒺藜料豆元斛杭菊茯苓女珍白芍雙鉤會皮竹心荷葉案右營陰不足氣火有餘心肝兩經燔灼陽明鬱熱牙宣半年諸虛雜出脘脹發嘈頭蒙艱寐脈見細弦急宜調理牙宣以冀血減則諸病皆除洋參旱蓮桑葉緑萼梅料豆元斛木神炒蔞皮女珍白芍龍齒丹參藕節紅棗案宋右二十牙宣連年陽明鬱熱肝風為之上擾頭髮眩暈脘悶心悸脈見細弦治以清養沙參元斛杭菊佛花料豆丹參雙鉤玉蝴蝶旱蓮白芍白蒺藜會白藕節白茅花四十四鼻衄案右陽絡受傷鼻衄狂溢薄而有紅者屬熱為多脈見細弦治以清降沙參池菊炭白芍茜根茅花膝炭會絡側柏三七丹參炭炒荊芥旱蓮焦藕節案左陽絡受傷鼻衄傾注甚至痰中亦帶脈見細弦不加咳嗽總可調復沙參菊炭降香白芍茅花膝炭鹿銜會絡三七丹參炭仙鶴杏仁藕節絲瓜絡案趙左鼻衄狂溢營傷氣痹兩脅作脹當脘發迸脈見沉弦擬以和養降香仙鶴歸鬚桑葉全福丹參白芍杏仁猩絳膝炭茯苓會絡加絲瓜絡藕節四十五鼻淵案左鼻衄屢發洋人所謂傷腦氣筋也桑葉杏仁杭菊料豆茅花川貝荊芥通草腦石紫菀白芍會皮枇杷葉紅棗案高右鼻疳復發並溢清水鼻骨痠麻考鼻為肺竅由於肝邪爍肺肺失清肅脈見細弦擬肝肺兩調沙參嫩辛夷杏仁茯苓桑葉魚腦石半夏料豆茅花白芍川貝新會枇杷葉竹心案殷左鼻淵復發風邪挾濕上蒸清竅治以清養沙參元金斛薄荷山梔辛夷炒川柏鉤藤生草魚腦石茯苓丹皮緑豆衣枇杷葉紅棗復鼻淵稍減咳嗽有痰頭蒙腰楚脈見細弦治以清降洋參山梔川貝鉤藤辛夷知母益元散通草魚腦花粉生草會皮枇杷葉荷邊
