body:
  text: 卷中一痢疾案於左四歲赤痢未止舌黃口渴身熱腹痛關係者又在噤口擬以疏和川連元米炒炒荊芥川斛白薇白頭翁地榆會白雞金銀花炭側柏益元散楂炭粳稻葉一大握煎湯代水案吳右霍亂後又發痢疾舌剝口噤如何支持洋參甘中黃木神野赤豆地榆赤白芍各一錢丹參緑豆衣銀花炭藿石斛赤曲會皮卷竹心稻葉一束案右紅白痢晝夜百計脈見細弦治以疏和香連丸八分赤曲薑炭萆薢白芍楂炭地榆澤瀉香附大腹荊芥新會紅白扁豆花案左酒客濕熱傷營每便乾結帶下赤痢脈見細弦由陽明而損肝脾漸為腹痛形黃擬以疏和臟連丸大腹側柏澤瀉紅曲木香炒荊芥車前楂炭香附地榆會皮野赤豆案右休息久痢新積色白脈見沉弦擬苦辛固養駐車丸地榆扁豆衣川楝白芍側柏通草會皮楂炭茯苓米仁澤瀉紅棗案左痢疾小腹發迸肛門氣墜欲便不利屬半虛半實脈見沉弦治以和養白朮吳萸川楝穀芽香附白芍木香車前建曲大腹佛柑陳皮陽春砂仁棗案張左四十四脫力阻氣脅痛稍減尚似痢非痢裡急後重治以疏和白朮香附佩蘭茯苓建曲大腹米仁通草楂炭炒荊芥益元散新會荷葉復血痢漸減再以疏和白朮大腹佛手佩蘭建曲廣木香楂炭炒荊芥香附會皮益元散米仁紅扁豆花案右肝脾失協赤痢屢發小腹迸痛得食缺運脈見細弦擬以和養白朮金斛木神川斷赤曲白芍丹參佛柑香附煨木香杜仲新會荷蒂案右休息痢有赤無白腹痞攻痛脈息濡細陰虛之體舌苔光剝擬以和養於術紅曲炮薑炭杜仲黨參艾絨炭地榆丹參香附煨木香側柏白芍荷蒂棗案左赤痢久而不止腹痛肛痛肢腫納少脈見細弦擬以溫養白朮炮姜吳萸補骨黨參地榆白芍菟絲香附木香杜仲車前荷蒂棗案左赤白痢減肛墜裡急脈見細弦擬升清降濁茅朮建曲澤瀉升麻黨參楂炭茯苓白芍川連元米炒廣木香野赤豆會皮荷蒂棗二腸風案徐左幼年間鼻血吐血陰分早虧虛熱內熾現在熱迫大腸腸風綿延血下如射每便堅澀肛痔外凸關係者在夢泄精血兩傷諸恙從此蜂集神煩少寐頭眩目花驚悸不寧脈見弦大治以清養珠兒參郁李仁旱蓮甜杏仁烏芝麻柏子仁女珍槐花炭川石斛地榆制元參蓮鬚西瓜翠松子仁鮮藕肉一兩卷竹心案左早有痰血臟熱移腑傳為腸風血下如注大便艱澀由陰傷氣漸至納少神疲氣逆肢倦脈見弦滑虛多邪少治以和養珠兒參地榆料豆生熟穀芽烏芝麻側柏女珍茯苓川斛白芍炙草新會紅棗案左便燥帶血屬腸風為多久則損及肝脾形黃腹痛脈見沉弦擬以和養元生地地榆赤曲茯苓川斛炒荊芥料豆炙草白芍扁柏杜仲會皮荷蒂紅棗案沈左四十二陽明鬱熱肝脾統臟兩為失司以致氣陷為肛墜營虛為腸風脈息沉弦舌苔微灰嗜煙體氣陰兩傷調理不可偏陰偏陽治以和養黨參赤曲扁豆衣訶子肉一錢五分於術地榆炒椿皮炒荊芥元斛白芍丹參炒扁柏炒荷蒂棗復腸風綿延或輕或重血下如水甚則後重脈見沉弦陽明鬱熱肝脾又失統臟以致營不為守再以和養於術丹參茯苓椿皮地榆赤白芍各一錢扁柏扁豆衣元斛新會炒荊芥赤曲荷蒂棗三痔血案左痔血受傷營虛熱熾陽明傳送無權大便堅結數天一行行而不暢脈見弦大舌苔光紅擬以清養珠兒參旱蓮草生當歸地榆火麻仁黑料豆白芍制元參瓜蔞仁女珍丹參新會松子肉三十粒復陽明鬱熱痔血頻仍大便每每艱行脈息弦細虛多邪少治以清養洋參旱蓮川斛丹參烏芝麻料豆當歸地榆白芍女珍柏仁新會松子肉紅棗四便血案左痢久漸成便血便之前後俱溢晝夜六七行腹痛裡急脈見沉弦形黃肢腫應月枯少能否得復治以和養珠兒參木神椿皮丹參臟連丸龍骨赤曲於術白芍會皮地榆香附側柏棗案劉左肢腿之病尚不見發惟濕火內蒸隨氣下陷陰分已傷脫肛類痔便艱下血病滋水交流陽明濕火觸發肝邪氣逆作嘔上焦為患屬陽明胃府下焦為患屬陽明大腸邪熱俱在陽明遂至雷龍失潛頭脹頻仍少寐多夢納穀尚少大便尚澀所以左脈細弦右脈弦大不靜屬邪正相搏治宜兼顧珠兒參木神半夏白芍元斛丹參新會地榆臟連丸炒槐米菊花姜皮側柏竹茹案左便血綿延脫肛腹痛脈息濡細治以疏和黨參香附丹參楂炭白朮木香側柏炮姜赤曲地榆白芍新會荷蒂棗五泄瀉案左脘滿作瀉腹痛肢倦治以疏和羌活雞蘇散陳皮川楝防風偏蘭鬱金茯苓小朴大腹蔻仁米仁荷葉案孩暑邪內蘊風邪外束寒熱而兼泄瀉治以分疏防風天水散五穀蟲一錢五分荊芥麥芽大腹皮佩蘭雞金車前荷葉白扁豆花案右久瀉未止肝脾傷也白朮大腹川斛香附建曲佩蘭鬱金茯苓小朴米仁補骨陳皮荷葉棗案孩受涼傷中洞泄無度脈弦擬以疏和於術佛手萆薢大腹建曲佩蘭澤瀉米仁小朴連皮苓雞金會皮扁豆花案左泄瀉漸止脘悶納呆脈見沉細屬半虛半實擬以調中化邪白朮香附佛手生熟麥芽建曲大腹絨佩蘭通草小朴半夏煨木香新會荷葉案右由血轉痢由痢轉瀉納呆舌光脈息沉弦擬以和養白朮佩蘭丹參白芍楂炭佛手穀芽澤瀉川斛苡米茯苓新會扁豆花七朵紅棗荷蒂案左久瀉不止大腹膨滿得食作脹向有遺泄便溏由陰傷氣現在病寓中焦脈象細弦擬以調養白朮煨木香元斛茯苓志曲車前新會米仁香附澤瀉生穀芽白芍荷蒂紅棗案右久瀉不止由脾及胃胃納作脹土衰關乎火弱舌剝肢腫咳嗆氣逆脈見細弦治以疏和於術補骨皮苓粟殼香附鬱金大腹炙草建曲石蓮肉炒二錢新會車前伏龍肝棗案右生冷傷中中焦積滯腹部隱痛便溏納呆防轉為痢疾脈來沉細治以疏和香附小朴白蔻仁通草廣木香佩蘭米仁鬱金大腹建曲新會茯苓荷葉案右洞泄無度舌糙如苔寒濕水毒一時充斥陽明擬以分泄茅朮皮苓大腹車前防風廣藿萆薢澤瀉小朴建曲佛手新會扁豆花七朵六痰飲案左肺虛生痰腎虛生飲內擾咳嗽綿延漸加氣怯上下攝納無權中焦亦失砥柱納食缺旺兩足浮腫脈見沉弦擬以和養於術全福蘇子元斛半夏石英款冬杜仲川貝冬瓜子白芍新會枇杷葉銀杏肉案左中氣不振積痰生飲阻遏升降道路脘宇攻動漉漉有聲必得噯氣然後鬆軟脈見沉弦治以調降於術沉香曲木神香附黨參澄茄遠志新會半夏左金白芍小青皮玫瑰露炒竹茹案朱左封藏早虧水不涵木木邪擾中中焦積痰蓄飲以致臍腹間似痞非痞有時下陷轉而上升即為胸次窒塞又復凌心心悸艱寐迫腎為之夢遺種種升降失司陰陽造偏頭眩耳鳴鼻衄疝墜脈見細弦舌苔滑膩虛中挾實實即痰飲擬交坎離而調木土於術全福瓦楞半夏代赭夜交藤秫米丹參鴨血拌白芍洋參芝麻新會竹二青案費右下虛生飲氣虛生痰喘腫多年痰不從咳而化飲不從便而達以致肢面皆腫先為脅痛由絡脈泛濫肌膚高年防氣不歸元茅朮皮杏仁蘇子茯苓防己川貝桑皮米仁萆薢冬瓜子新會天仙藤姜衣陳麥柴七脾胃案王左能食無力大便屢解有時當脘作痛痛行臀部得一轉矢氣較松脈見沉弦治以調養黨參半夏益智杜仲白朮左金澄茄香蟲建曲香附白芍新會老檀香四分姜竹茹案高左脘宇懊憹得食每為上冒頭痛肢酸早有便溏脾胃受傷治以和降生白朮小朴全福茯苓枳實鬱金代赭白芍半夏姜渣瓦楞新會姜竹茹白檀香八瘧疾案朱左十六暑風客邪內伏募原營衛不和致發瘧疾少熱多寒脘悶頭眩脈見弦數治以分泄兼顧便堅腹痛舌黃口渴蘇梗一錢五分黃芩益元散桑葉煨草果四分青蒿小朴白薇炒知母一錢五分枳殼苡米佩蘭荷葉竹茹陳皮半夏案張左間日發瘧寒少熱多有時但熱不寒脘悶頭痛渴不多飲便澀溺赤脈見弦滑舌苔黃膩屬風暑痰濕四邪交併表裡因之失宣擬以疏和煨草果八分青蒿半夏桑葉炒知母黃芩川貝白薇制小朴益元散建曲赤苓荷葉佛手九類瘧案劉右六十三咳嗽痰薄類瘧寒熱脈見弦滑治以分疏豆豉小朴白薇益元散防風薄荷茯苓通草前胡佛手米仁新會荷葉復類瘧較輕仍咳嗽痰多當脘滿悶脈見弦滑治以分泄半夏桑葉益元散佛手川貝白薇小朴赤苓前胡米仁建曲通草枇杷葉洋佩蘭復類瘧已止咳喘未除脈見弦滑治以疏和半夏桑葉茯苓款冬川貝杏仁通草佩蘭蘇子前胡會白穀芽枇杷葉十間日瘧案左間日發瘧寒熱滿悶咳嗽泛惡脈見細弦治以分疏豆卷米仁佛手白薇小朴佩蘭蔻仁杏仁建曲會皮通草前胡荷葉姜竹茹案右間日發瘧寒少熱多煩悶非常表未解則汗不多里不達則大便結九竅不和都屬胃病胃不和則臥不安也至於骨痛肢麻舌剝等症且從緩治姑擬以分疏先之豆卷小朴瓜蔞皮木神青蒿志曲枳殼川斛黃芩佛手佩蘭通草荷葉十一三瘧案徐左三瘧五年勞動即發寒熱從中營衛受傷脈見濡細屬虛而非實治以和養耆皮當歸半貝丸三錢丹參防風銀柴桑梗川斷白朮白薇新會杜仲棗生薑二小片案左勞倦成瘧是為勞瘧微寒微熱盜汗納少脈見濡細擬和表裡兼顧咳嗽耆皮當歸蘇子茯苓防風銀柴款冬米仁杏仁白薇會紅通草姜竹茹案左三瘧陳亂嘔瀉仍作脈見沉弦治以疏和半夏鬱金桂枝大腹建曲蔻仁白芍茯苓小朴米仁佛柑新會姜竹茹十二瘧母案左瘧母攻脹肢酸脘悶脈見細弦治以疏和焦茅朮大腹連皮苓小朴米仁蔻仁建曲戈半夏衝入三分新會荷梗案左瘧母內損頭眩肢倦便溏帶血脈見細弦恐其成勞生白朮米仁澤瀉大腹小朴佩蘭野赤豆白芍建曲楂炭佛手新會荷蒂棗十三狐疝案左狐疝出沒無常少腹牽引作痛脈見沉弦治以疏和當歸鹿角霜香附丹參川楝枸杞茴香荔核香蟲杜仲白芍橘核絲瓜絡焦茅朮案左七疝中之狐疝出沒無常其聲嗚嗚然屬肝腎內虛氣為下陷脈弦治以和養黨參香附杜仲會核當歸吳萸甘杞荔核菟絲白芍桑梗楂炭絲瓜絡十四血疝案左疝脹屢發色紅而熱七疝中之血疝治以和養一切內熱盜汗口渴便艱均須照顧左金丸枳殼橘核香蟲川楝當歸楂核丹參鱉甲銀柴青皮白芍絲瓜絡十五沖疝案左沖疝下墜至囊上衝嘔逆沖甚欲厥擬以溫養肉桂木神川楝香附白芍當歸九香木香沉香曲杜仲荔核會皮絲瓜絡十六水疝案左水疝脹大出水脈見濡細治以疏和白朮香附鹿角霜帶皮苓半夏姜炒吳萸官桂煨木香建曲白芍甘杞新會青荷梗棗案左二十九據述疝脹潰頭流水鬱郁大致水疝之象治以疏和兼顧寒熱茅朮皮米仁橘核香附枳殼茯苓荔核小朴萆薢川楝青皮豆卷荷葉十七㿗疝案左疝氣兩月未止恐成㿗疝尾閭結核亦屬濕痰脈見細弦治以疏和香附當歸荔核枳殼川楝甘杞夏曲木香九香杜仲新會萆薢絲瓜絡案左右部睪丸堅結不和漸成㿗象惟目赤屢發肝家素有鬱熱一切過溫之藥似在禁例脈見弦滑治以清養左金丸杜仲川楝洋參當歸桑寄生楂炭枳殼丹參白芍會核青皮鱉血炒絲瓜絡轉方去左金丸加沙苑十八腳氣案腳氣疲軟朝退暮重少腹發麻氣逆上升脈見沉弦再以通陽益氣西潞黨生牛膝菟絲茯苓生於術木防己北五味白芍安肉桂車前乾薑蜜炙苡米干松節三錢桑梗五錢磨沖沉香一分案左腳氣屬脾腎兩虛寒濕內滯兩足浮腫有上行之勢兩便少行最恐衝心犯胃手指麻痹治從和解藉以通利機關白朮防己五加茯苓桂枝萆薢海桐野赤豆檳榔會皮澤瀉天仙藤姜衣四分案左乾腳氣兩足軟不能行手亦發麻頗有上升之勢犯胃衝心皆能傳變脈見沉細急須調治桂枝四分防己小朴五加細辛四分萆薢牛膝天仙藤白朮會皮杜仲當歸姜衣四分絲瓜絡復腳氣疲軟難行兩手亦麻脘悶納少脈見細弦屬脾腎致虛風寒濕襲入絡脈仍從溫養桂枝防己天仙藤茄皮檳榔木瓜海風藤小朴蘇梗萆薢半夏會皮杉木節三錢絲瓜絡案左腳氣將成恐上升為變脈見細弦擬去寒濕制茅朮防己苡米生牛膝桂枝萆薢天仙藤五加白芍木瓜桐皮新會絲瓜絡案程左五十一腳氣漸成有升少降少腹窒塞手指發麻塞濕之邪實少去路二便又為失利脈見沉弦舌糙急宜疏導焦茅朮檳榔川楝獨活防己蘇梗海桐皮澤瀉半夏生膝茄皮全瓜蔞地栗干姜衣案左腳氣暴起兩足見腫亮手麻發痙有積水上衝之勢脈浮弦擬先開降桂枝萆薢連皮苓生瓜蔞葶藶防己桑皮枳殼杏仁懷膝新會澤瀉姜衣陳麥柴案左腳氣將升痠軟不和少腹手指皆為發麻恐其上衝為變脈見沉細治以和養獨活當歸生淮膝木瓜寄生檳榔五加皮會絡木香蘇梗防己天水散三錢絲瓜絡杉木節三錢案左足膝痠軟神疲納少治以疏和西羌活防己淮膝半夏香獨活萆薢杜仲加皮桑梗天仙藤晚蠶沙會皮加絲瓜絡十九臌脹案左臌脹筋露臍平囊莖皆腫積水不化治以分導桂枝大腹澤瀉川楝白芍連皮苓防己車前櫞皮會皮川椒目八分黑白醜磨沖沉香一分地栗干陳麥柴三錢案王左三十九積濕化水水泛為腫腫勢漸升漸上由足而腹而面面為之浮腹為之脹關係又在小便不利治以通降桂枝腹皮澤瀉香附白芍皮苓防己建曲櫞皮會皮椒目萆薢通天草西砂仁案左臌脹傷氣易治耗陰者最不易調腹臌臍平兩便少行脈左弦數舌剝口渴擬通關導水肉桂川楝水炒黃柏雞金白芍淮膝肥知母丹參建曲茯苓野赤豆會皮陳麥柴案右肝脾內傷已成臌脹兩便失利上逆為咳脈見細弦治以和降肉桂川楝陳櫞車前白芍淮膝香附杏仁建曲大腹萆薢黑白醜陳麥柴案左單腹脹屬脾胃受傷不同積水遏濕通行即解脈見沉弦治以疏和香附白朮川楝淮膝陳櫞枳實九香白芍建曲皮苓歸鬚會皮野赤豆陳麥柴案高左草九脘腹脹滿甚至腎囊俱腫氣急發嗆三焦不能分化防成臌脹脈見細弦治以疏和香附白朮大腹半夏陳櫞小朴澤瀉米仁建曲皮苓萆薢新會野赤豆通天草案右氣臌漸成肝脾受傷屬氣痹營虧若兩便不走恐膨滿日增擬以通降香附川楝大腹野赤豆建曲香蟲澤瀉萆薢陳櫞皮苓白芍新會陳麥柴案左臌脹受溫溫則氣通逐水脈見細弦肝脾久傷治以溫通於術腹皮澤瀉野赤豆熟附子防己淮膝白芍櫞皮萆薢椒目新會檀香四分陳麥柴案左肢腫腹滿腫勢由下升上咳嗆不爽舌苔粉白脈息濡細治以溫通白朮白芥子一錢五分牛膝葶藶熟附子川椒目蘇子茯苓半夏木防己款冬新會砂仁案左痞散成臌大腹發熱愈熱愈大脈芤無度陰傷氣痹恐有不得了之勢於術大腹車前野赤豆鱉甲皮苓生膝萆薢建曲陳櫞白芍新會地栗干絲瓜絡案左水勢狂溢腫脹漸成膨滿腹大囊腫色亮泛濫之勢上及高原氣喘有痰脈息沉弦擬通導溝渠川桂枝櫞皮澤瀉杏仁白芍建曲米仁蘇子葶藶淮膝茯苓會皮姜衣麥柴案曹右腫脹之勢漸及四肢面部胸次窒塞大便艱澀現在痰濕逗留阻遏氣道若小便不行如何支持急圖疏化桂枝生膝小朴皮苓白芍澤瀉半夏杏仁葶藶炒瓜蔞會皮桐皮麥柴姜衣案沈左皮水屢發溺閉即腫腫勢上中下三焦俱到脈見沉弦治以通降茅朮皮米仁陳皮防己黃芩滑石冬瓜皮澤瀉皮苓萆薢杏仁車前荷梗案郁左表裡同病臌脹外再有寒熱發喘不納不便如何支持茅朮皮川楝車前小朴黃芩白芍冬瓜皮米仁綿茵陳建曲大腹萆薢野赤豆麥柴案顧左五十四肝脾久傷腹膨放後納呆形黃便多溺少脈見細弦治以疏和黨參皮苓香附澤瀉白朮大腹木香赤豆建曲新會香蟲車前紅棗顧復兩次放臌腹滿雖平肝脾未免受傷形黃疲倦納食不多脈見細軟再從和養黨參茯苓香附生杜仲於術大腹煨木香陳櫞建曲新會九香車前西砂仁紅棗二十噎膈案左未能辟穀登仙格症但求進食高麗參須木神丹參瓜蔞仁法半夏遠志腹糧煨益智生當歸白芍香附陳皮竹茹棗案左陰耗陽結謂之關格隨食隨吐更衣艱澀攻補不受大致氣與液兩虧痰與飲用事脈見細濡調理為難吉林須關虎肚丹參澄茄宋半夏戌腹糧志曲佛花生當歸生白芍生穀芽會皮姜竹茹棗案右肝邪內擾積飲蓄痰阻遏脾胃升降氣道穀食難下吞酸吐沫必得大便通行漸覺鬆動屬上格下關之象高年患此必須調理尤在頤養吉林須虎肚木神澄茄半夏腹糧遠志白芍左金丸生當歸丹參會皮姜竹茹案左上格下關謂之關格所食無多尚欲吐出吞酸吐沫脘宇或痛或脹更衣十餘日一行糞如羊矢脈左右沉濡氣痹液耗用藥不可偏陰偏陽擬以和降調中吉林須虎肚木神澄茄宋半夏腹糧遠志麥冬川石斛白芍丹參新會竹茹伏龍肝案李左三十四關格數年一飲一食皆難停留必得吐盡後已漸至氣久不能升降現在陰液亦為枯槁嘔甚見血脘腹通連梗痛脈六部細微無六淫外感亦無七情內發昨晚形寒發熱寒暖不調所致擬調中降逆吉林須全福木神姜半夏川連元米炒代赭益智丹參蘇梗瓦楞志曲會皮姜竹茹伏龍肝案左隨食隨吐名曰上膈脈見細弦治以通降左金丸全福虎肚澄茄半夏代赭腹糧益智當歸建曲白芍木神姜竹茹棗案左上格為嘔逆下關為便閉上下不和由於中焦窒塞當脘滿悶時發懊憹脈見弦澀弦主陰耗澀主氣痹久延恐難調復左金丸木神虎肚瓦楞法半夏遠志戌糧志曲生當歸丹參白芍會皮竹二青案左肝邪侮中中有積飲當脘作痛兼脹吞酸吐沫脈見細弦中焦升降失調厥陰遂為充斥更衣不利上格下關之勢吳萸生當歸戌腹糧澄茄川連木神白芍益智姜夏丹參新會建曲姜竹茹案右上嘔不止下便不利是為關格脈見沉弦老年陰耗陽結難許調復左金丸木神虎肚沉香曲生當歸遠志戌腹新會香附丹參白芍姜夏姜竹茹二十一痢後案張左昔年痢後受傷久而不復大便有溏有結溏時每為帶血營虛生風氣虛生濕風濕之邪外遊肌表或寒或熱或為發瘰關係者肛門發麻有時上升可及遍體脈見細弦治以疏和耆皮白朮地榆一錢五分豨蘞三錢防風當歸炒槐米一錢五分梧桐花寄生丹參炒椿皮一錢五分側柏紅棗復休息痢後有時下血作瀉由陽明垢滯隨去隨生以至肝脾受傷生風挾濕忽寒忽熱遍身發麻最慮者上至巔頂下至肛門脈見細弦治以和養防風秦艽丹參冬瓜子炒荊芥白芍茯苓川斛臟連丸地榆赤曲新會側柏二十二囊漏案艾左三十四陽明太陽之間小腸之下垢穢不能分化當時滿腹攻痛漸至大便鮮通囊為出糞年餘淹纏脈見沉弦擬分清降濁敗醬草三錢生當歸米仁生草川楝新會皮冬瓜子荔核瓜蔞仁茯苓洋參白芍黃絹三寸一方化灰沖服復大便失行舍正路而不由陰囊膜破糞即由此而行脈見濡軟證情淹纏一時難復擬以疏導通幽丸三錢敗醬草生當歸青皮火麻仁三錢丹參橘核茯苓西洋參一錢白芍荔核蠶繭灰一錢五分黃絹三寸一方化灰沖服通幽湯方油當歸升麻桃仁甘草紅花熟地生地煎成用藥汁磨檳榔五分調服二十三尿血案董左謹讀證情當是尿血與血淋諸症有別考此證多屬腑病由小腸之熱瘀注膀胱惟病久而由腑及臟心與小腸腎與膀胱本關表裡以故數年來溺血頻仍血色不一紫黑鮮紅日夜無度大致紫黑者出於管竅鮮紅者隨溢隨下精溺管異路同門勢當混淆甚至莖梗毛際隱痛或似精泄或似溺迸至頭眩目花脅脹腰痠亦為應有之義心與肝同氣腎與肝又同源從中肝邪尤為之煽爍用藥之義腑瀉而不藏臟藏而不瀉極多牽制照病處方溫氣兼以潛陽滋陰更須利竅與中虛厄忒亦有照顧九制熟地三錢生甘草東白芍吉林須五分熟甘草冬葵子安南肉桂四分鳳凰衣木神真西珀末四分西赤芍蓮鬚亂頭髮肥皂水洗乙團黃絹三寸一方化灰衝入案右迸傷氣分膀胱失司不約又為不利下竅發墜每溺作痛所下且有血絲脈見沉弦治以和養生綿耆血餘炭甘草梢八分白芍鳳凰衣冬葵子覆盆子茯苓小薊炭桑螵蛸石斛絲瓜絡案江右五淋中之勞淋勞傷氣迸發為淋濁赤白交下每解痛苦非常脈見沉弦治以和養生綿耆小薊炭甘草梢白芍元生地血餘炭丹參茯苓鳳凰衣蒲黃炭側柏會皮絲瓜絡案左高年陽盛陰熱向來便血今復血滲膀胱漸成尿血連發未止脈見細數治以清養洋參木神料豆牡蠣薊炭龍骨女珍沙苑白芍石斛旱蓮丹參藕汁一小杯側柏二十四淋濁案王左四十氣虛下陷小便先為不利繼以淋濁遂至分化無權其氣由前向後更衣欲通不通氣墜矢氣難轉脈見細弦舌苔黃白擬以升補生綿耆三錢炒黃柏木神米仁炙升麻四分知母川斛白芍北柴胡鱉血炒四分覆盆甘草梢八分新會辰燈心栗子衣二枚案左氣陷脫力溲時倣佛精墜發酸不禁脈見濡細擬以升補生綿耆蓮鬚木神丹參炙升麻覆盆牡蠣夜交藤北柴胡鱉血炒白芍川斛新會金櫻膏三錢沖案左精溺渾淆小便不禁且帶白垢脈見弦滑治以和養生綿耆洋參牡蠣白芍蓮鬚木神料豆沙苑覆盆龍骨女珍陳皮紅棗金櫻膏案左精溺未得分清小便色濁每解似有阻隔脈見細弦擬以清解洋參木神白苡米鹽水炒料豆蓮鬚牡蠣炒知母女珍白芍川斛丹參雞肫皮海參腸紅棗案左三十二久則為淋精溺竅兩屬受傷溺為不禁精為遺滑脈見細軟擬以和養綿耆木神鳳凰衣杜仲蓮鬚龍骨螵蛸沙苑覆盆白芍新會牡蠣棗案左無感不發久則為淋管內漸痛由於郁邪不宣真陰已虧治以清養洋參沙苑白朮蓮鬚黃柏牡蠣料豆草梢白芍吞威喜丸一錢以上屬氣虛淋症案邢左三十六初則為濁繼則為淋溺數微癢熱毒未清脈見細弦治以清降萹蓄一錢五分草梢料豆山梔瞿麥三錢萆薢丹皮黃柏龍膽草八分滑石茯苓通草卷竹心十根案左迸傷為淋便痛莖腫囊筋牽引脈見細弦治以和養萹蓄萆薢石葦草梢瞿麥滑石銀花黃柏龍膽山梔茯苓新會辰砂拌燈心案左草九濕熱下注溺痛如淋且帶浮腫脈見細弦治以通降兼顧牙痛口疳萹蓄石葦海金忍冬瞿麥滑石連翹桑葉冬葵赤苓山梔薄荷荷葉燈心案邢左初則為濁溺痛發癢郁邪未清脈見細弦治以通降萹蓄丹皮萆薢黃柏龍膽銀花米仁知母鳳凰衣草梢茯苓通草卷竹心以上屬濕熱淋症二十五遺泄案陳左三十四脈稟六陽陽充則陰不為守久有遺泄有夢漸為無夢向春發而較勤且有盜汗種種心腎兩虧治以清養洋參木神料豆丹參蓮鬚龍骨女珍淮麥白芍川斛牡蠣新會棗案左遺泄有夢屬心無夢屬腎心虛於腎夢泄頻仍有時艱寐有時驚悸諸恙交集多屬心腎兩虧脈見弦滑擬以清養洋參辰茯神料豆連心麥冬蓮鬚龍骨女珍烏芝麻白芍夜交藤牡蠣新會皮棗案朱左有夢屬心無夢屬腎遺泄陰傷陽虛上冒頭蒙口渴心悸艱寐肢體痠軟治以和養洋參木神半夏牡蠣蓮鬚龍骨秫米夜交藤白芍石斛女珍新會辰燈心金櫻膏紅棗案姚左精關不固夢泄復發甚至小便不禁脈見細弦治以清養洋參木神料豆丹參蓮鬚龍骨女珍沙苑白芍川斛牡蠣新會棗案左久有遺泄一月必發數次有夢者屬心心虛於腎腎不足心陽偏旺考牙乃骨余關係於腎心火上爍挾風挾痰屢屢牙痛齦腫外突或平或發綿延經年防成骨槽風標實本虛擬清上攝下洋參杭菊木神川斛蓮鬚旱蓮丹參料豆白芍女珍殭蠶新會鹽水炒竹茹案程左三十四外感漸清諸恙輕減惟心腎兩為不濟肝主相火躍躍欲動艱寐稍平仍關門不固常常自遺素有頭