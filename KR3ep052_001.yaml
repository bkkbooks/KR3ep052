body:
  text: 卷上一中風案錢左三十一三瘧後風邪入絡口眼歪斜現在已得平復風勢走竄經絡肢麻筋掣脘痛腹鳴頭蒙發眩燔灼艱寐脈見細弦防成風癱治以和養香獨活炒當歸海風藤抱木神桑寄生炒丹參焙甘杞蒼龍齒川桂枝東白芍杭菊花宣木瓜絲瓜絡虎潛丸案孫左草六寒熱後風濕入絡肢骱痠痛甚於腰膝當脘亦似寒似痛脈見沉弦治以疏和香獨活海風藤生白朮炒香附酒桑梗五加皮炒杜仲炒淮膝炒當歸宣木瓜新會皮臭梧梗三錢絲瓜絡案趙左左臂瘦削屈伸不利痠痛之勢由肩及項甚至上連頭額營虛生風風入於絡久防偏枯脈見細弦治以和養香獨活梧桐花炒杜仲嫩鉤藤桑寄生五加皮白蒺藜宣木瓜炒當歸海風藤杭菊花威靈仙一錢五分絲瓜絡功勞葉去刺三錢案桑左風善行而數變兩足骱痛或上或下屬肝失營養挾痰挾濕與風走竄經隧久防癱瘓擬養營搜風兼化痰濕兩邪香獨活虎脛骨石決明四錢左秦艽桑寄生元武版杭菊花千年健生白芍雙鉤藤新會皮黑料豆絲瓜絡案龔右十九四肢麻痹肌膚髮癢脈見細弦治以和養香獨活宣木瓜梧桐花元生地炒當歸炒丹皮黑料豆甘草炒荊芥制豨蘞白蘚皮新會皮炒側柏案王右風痹走竄去年腰以下痠而且痛近則胸背牽引脈象沉弦擬以和養炒當歸虎脛骨海風藤威靈仙桑寄生元武版片薑黃八分五加皮左秦艽宣木瓜炒杜仲新會皮絲瓜絡案胡右三十一産前受風風鬱感邪腰俞下痠痛無度近乎半身不遂脈見細弦治以溫養香獨活鹿角霜一錢五分海風藤炒杜仲桑寄生焙甘杞千年健炒川斷炒當歸生綿耆五加皮新會皮絲瓜絡案沈右血虧生風腕後上升及背皆為不利脈見細弦治以疏和香獨活片薑黃四分炒木瓜炒川斷桑寄生川桂枝四分生白芍五加皮炒當歸天仙藤威靈仙新會皮絲瓜絡胡桃肉案童左六十一中風門痱與懿合風痹偏枯為四大證多主溫補以外風病溫涼補瀉無不可行現在見證本非中臟中腑而邪在筋絡所以足力弛軟腰不能支手難提高指有顫動究之肝腎兩經無不見虛以腰為腎腑肝主搐搦惟痰濕稟體又當夏令滋膩溫補確屬難進前次所用熟地附子者病家急求速效醫者希冀近功所以出王良詭遇之法矯其弊者涼化清解亦在禁例針灸似可緩之行之補針甚少瀉針為多不過在手法中左旋右旋就淺就深以分補瀉欲鼓動其真氣流灌其營陰恐非針力所能及拙見一月間針一二次至於服藥間日一服從容調治似最合宜請高明辨之備之候政潞黨參炒當歸炙虎脛左秦艽制首烏生白芍炙龜板片薑黃四分法半夏梧桐花炒杜仲千年健桑寄生功勞葉七片復診示及舌膩漸退根苔尚厚胃納略開仍未如常久有風患屈伸雖利步履欠穩濕由脾生風從肝發兩者互擾外則走竄絡脈內則阻遏中宮外偏於風內偏於濕新舊病皆根於此擬方即候政行生白朮香獨活晚蠶沙鮮佛手採藝曲桑寄生干佩蘭焦米仁宋半夏木防己厚朴花四分新會皮二竹茹玫瑰露炒功勞葉七片復診氣虛生痰營虛生風風邪挾痰走竄經隧偏左肢骱痠痛手則不能高舉足則開步不利脈右部滑大左部細弦舌苔黃膩納食欠旺稟體豐腴氣分早虧以脈合症又屬氣虛於營經云衛氣虛則不用營氣虛則不仁擬宗此旨立方調理諒無不合録方即候政行生於術桑寄生海風藤炒杜仲炒當歸晚蠶沙木防己抱木神竹瀝夏梧桐花炒淮膝新會皮玫瑰露炒竹茹絲瓜絡案趙左舌強不語右肢不仁中風兩者最為帶根高麗須天竹黃八分香獨活左秦艽石決明煅竹瀝夏桑寄生晚蠶沙細菖蒲八分新會皮梧桐花炒杜仲絲瓜絡案顧右五十六喉痹起因痰熱又復挾風漸至手痙面麻言語舌強脈見弦滑治以清熄杭菊花扎馬勃八分川貝母抱木神冬桑葉白殭蠶三錢梧桐花遠志肉天竹黃光杏仁白蒺藜陳膽星八分路路通七枚絲瓜絡荷邊案朱左風中廉泉口不能言舌則為短割而又為長伸四肢掣動脈息弦滑擬以和養陳膽星白蒺藜去刺左秦艽桑麻丸法半夏抱木神杭菊花宣木瓜生白芍遠志肉炒當歸新會皮槿樹葉絲瓜絡案陳左中風偏左左者為癱手足屈伸不利抽搐無度舌音不清脈見細弦擬溫降熄風川桂枝四分炙虎脛海風藤晚蠶沙羚羊片八分炙龜板天仙藤竹瀝夏炒當歸炒杜仲梧桐花伸筋草一錢五分酒桑梗三錢絲瓜絡案湯右左癱右瘓現屬於右手足麻木不仁皆由營虛生風風痰走竄絡脈不能流利機關脈見細弦擬以溫養川桂枝炙虎脛左秦艽宣木瓜元生地元武版法半夏生綿耆炒當歸桑寄生新會皮炒杜仲絲瓜絡海風藤復偏風於右肢節骱皆為腫痛痛甚於夜營陰不足內風襲絡所致脈見沉弦再以和養制首烏三錢炙虎脛炒杜仲晚蠶沙焙甘杞元武版左秦艽五加皮炒當歸桑寄生竹瀝夏新會皮絲瓜絡案徐左氣虛生痰陰虛生風風邪挾痰走竄經隧不能流利機關始起右臂屈而不伸繼則由手及足由右及左四肢皆為不利考肝生風脾生痰肝邪侮脾近時腹膨筋露脈來弦滑恐成癱瘓宜加意調理炒當歸晚蠶沙炙虎脛炒淮膝梧桐花海風藤炒丹參白茯苓竹瀝夏五加皮炒杜仲生白芍桑寄生絲瓜絡二類中案金右肝陰不足肝陽有餘陽化內風上擾清空兩目起星漸近失明關係者又在頭眩屢發厥陰衝犯陽明太陰當要嘔逆泛痰每每牽連並作脈見細弦舌苔中剝氣與陰虧風與痰盛久防類中擬以和養西洋參八分抱木神白蒺藜杭菊花元精石煅龍齒潼蒺藜新會皮東白芍宋半夏炒丹參炒淮膝鮮荷邊玫瑰露炒竹茹案胡左上重下輕頭蒙發眩兩足痠軟脈細而弦最防類中西洋參抱木神新會皮炒丹參元精石煅龍齒潼蒺藜炒淮膝東白芍宋半夏杭菊花焙甘杞洋青鉛炒竹茹三肝風案高左頭疼時沖或嘔或溏脈見細弦治以疏和法半夏抱木神嫩鉤藤冬桑葉煨天麻八分煅龍齒蔓荊子一錢五分石決明生白芍杭菊花新會皮炒丹參荷邊竹茹案陸右頭風眩蒙嘔逆無度治以鎮養法半夏杭菊花白蒺藜生白芍煨天麻雙鉤藤潼蒺藜元精石桑麻丸白藁本炒淮麥新會皮荷邊竹茹案陸左頭風犯中漾漾欲吐形寒手麻血虛挾風治以和養法半夏杭菊花白蒺藜煅龍齒煨天麻香獨活白藁本八分嫩鉤藤生白芍桑寄生抱木神新會皮荷邊薑竹茹案陶左三十二頭風有根每發必為泛惡脈弦舌膩治以疏和杭菊花抱木神法半夏焦建曲雙鉤藤蒼龍齒制小朴八分冬桑葉白蒺藜白殭蠶三錢新會皮蔓荊子一錢五分荷邊炒竹茹復頭風痛發額筋抽搐夜甚於晝衝犯中焦併為嘔泛脈息沉弦治以和降石決明六錢雙鉤藤抱木神蔓荊子一錢五分白殭蠶白蒺藜蒼龍齒制小朴冬桑葉杭菊花法半夏焦建曲荷葉邊案馮左草四頭風有根受涼易發發甚肝邪犯中即為嘔吐脈息沉弦治以調降法半夏抱木神白蒺藜桑寄生煨天麻四分煅龍齒新會皮杭菊花生白朮雙鉤藤炒淮膝蔓荊子一錢五分荷邊炒竹茹案傅左真水素虧肝邪上擾頭痛與牙痛時作而時伏脈左弦於右屬木凌土位納呆神倦有由來也擬以和養西洋參八分黑料豆抱木神杭菊花桑麻丸煎入川貝母煅龍齒雙鉤藤東白芍川石斛旱蓮草新會皮荷邊湘蓮肉七粒案任左肝陽胃熱挾風擾動牙痛甚發連及頭額現在痛勢雖平尚牙齦浮腫齒亦動搖脈見弦數半虛半實虛屬陰分素虧實為餘邪未盡擬以清泄西洋參制女珍抱木神炒殭蠶蜜炙桑葉黑料豆白蒺藜冬白芍杭菊花旱蓮草藿石斛新會皮卷竹心草根鮮荷葉案沈左真陰內虧氣火為熾火本熱熱生風上擾清空頭蒙烘烘耳鳴目澀甚至風從外越時起風塊風火走竄肉瞤不寧腹痛熱熾種種肝腎內虛龍雷失潛脈見細弦治以鎮養西洋參抱木神杭菊花石決明霜桑葉蒼龍齒黑料豆雙鉤藤黑芝麻元精石生白芍白蒺藜荷葉邊洋青鉛案費右左頰痠疼牙床開合不利脈見細滑治以和養北沙參黑料豆石決明炒殭蠶蜜桑葉制女珍白蒺藜東白芍杭菊花川石斛煅龍齒新會皮荷邊案楊右營陰內虧肝邪化風頭痛頻仍右部為多甚則滿頂皆痛脈息沉弦並無感冒證情皆由內發久防目損治以和養西洋參元精石抱木神法半夏桑寄生杭菊花蒼龍齒白蒺藜黑料豆生白芍雙鉤藤新會皮荷葉邊接方冬桑葉石決明黑料豆元精石黑芝麻煨天麻雙鉤藤白藁本白蒺藜潼蒺藜生白芍炒丹參鮮荷葉邊洋青鉛案張左肝風入絡由於陽化內風左面部抽搐無度脈見細弦治以和養冬桑葉抱木神杭菊花黑料豆黑芝麻煅龍齒雙鉤藤沙苑子石決明元精石煨天麻白蒺藜荷邊四歷節風案王右歷節風走竄遍體頭痛耳鳴肝陽挾痰頸項成癧脈見細弦屬營虛生風氣虛生痰治以和養西洋參光杏仁冬瓜子炒當歸夏枯花川貝母桑寄生炒杜仲川石斛東白芍新會皮左秦艽虎潛丸三錢絲瓜絡復歷節風象逢骱皆痛脈細舌光治以和養香獨活虎脛骨宣木瓜五加皮酒桑梗元武版炒淮膝炒丹參海風藤炒當歸海桐皮東白芍絲瓜絡案裘右五十四歷節風痛由足及手由右及左脈細舌光屬營虛生風治以和養香獨活竹瀝夏五加皮木防己桑寄生炒當歸炒淮膝威靈仙梧桐花海風藤炒杜仲新會皮絲瓜絡案何右四十七逢骱痠痛且麻且腫防成歷節風痛脈見細弦治以疏和兼顧脘脹納呆香獨活炒當歸木防己炒香附酒桑梗海風藤炒淮膝佛手柑梧桐花晚蠶沙五加皮新會皮絲瓜絡五遊風案朱左濕熱挾風外達肌表發為遊風起瘰發癢脈見沉弦治以宣化炙桑葉炒扁柏三錢黃防風焦米仁制豨蘞三錢白蘚皮一錢五分荊芥穗一錢五分赤苓皮五錢淨蟬衣四分地膚子杭菊花新會皮絲瓜絡案吳右十六遊風渾身塊癢治以泄化冬桑葉連翹心白蘚皮生白芍制豨蘞三錢焦山梔生甘草淨苦參梧桐花金銀花一錢五分粉萆薢焦米仁絲瓜絡案陳左遊風之類遍體滋竄脈見細弦治以清養元生地緑豆衣焦梔皮焦米仁制豨蘞大力子生甘草赤茯苓五錢黃防風塊滑石荊芥穗新會皮忍冬藤六錢炒扁柏三錢案秦右四十遊風遍體發癢無度脈見細弦治以清降制豨蘞地膚子忍冬花一錢五分天花粉細生地生甘草焦山梔炒丹皮白蘚皮連翹心冬桑葉白茯苓炒側柏案蘇左草二遊風作癢屬肺脾之邪制豨蘞炒澤瀉忍冬花地膚子元生地炒丹皮焦米仁海桐皮左秦艽焦山梔白蘚皮生甘草炒側柏案冷左五十六遊風漸成上下體俱為滋蔓脈見沉弦治以清化黃防風焦山梔地膚子金銀花製大黃制豨蘞粉萆薢新會皮大力子白蘚皮淨苦參生甘草炒側柏六冷麻風案顧右五十六冷麻風且冷且麻甚於右手左足脈細弦治以和養炒當歸嫩鹿筋一錢五分五加皮炒淮膝桑寄生焙甘杞海風藤梧桐花炒杜仲東白芍威靈仙一錢五分新會皮絲瓜絡復冷麻風再以溫陽藉理麻痹全當歸酒炒香獨活宣木瓜威靈仙一錢五分焙甘杞桑寄生海風藤五加皮一錢五分炒淮膝鹿角霜三錢梧桐花炒川斷虎潛丸煎入絲瓜絡案高右三十四冷麻風再以疏和川桂枝四分生白芍五加皮新會皮西羌活八分連皮苓粉萆薢宣木瓜黃防風炒米仁桑寄生梧桐花絲瓜絡七肩風案薛左肩風發於腰痛之後本元為虛屬水不涵木指甲枯脫脈見細弦治以和養香獨活宣木瓜五加皮威靈仙片薑黃四分左秦艽粉萆薢宋半夏虎潛丸炒當歸炒杜仲新會皮酒桑梗絲瓜絡案駱左體倦綿延肩胛痠痛納呆脈細防成肩風香獨活生白朮佛手柑酒桑梗炒枳殼炒川斷焦建曲炒香附五加皮天仙藤法半夏新會皮案陳左三十二肩風痠痛脈見細弦擬以和養威