主表裡之權咳嗽未減而寒熱交作肢冷背寒神疲嗜臥兩日稍解而未清前診脈之細弦舌之黃剝顯屬表失衛外里失主中沙參仙半夏青蛤散五味耆皮川貝當歸薑渣防風白芍元斛白薇竹茹案左兩脈俱靜左靜則根本無損右靜則感冒漸清寒熱已止大便通暢惟侵晨尚有咳痰白沫中略有黏膩最恐擾動肺痿舊根當長夏炎熱方興未艾最宜保護氣臟再須清熱和陰新舊病兼顧為宜沙參冬蟲白芍元斛耆皮女珍茯苓川貝防風杏仁冬瓜子會絡枇杷葉竹茹肺露紅棗案左咳嗽綿延音嘶痰沫肉落氣逆脈左細右弦氣虛見症為多擬以和養沙參杏仁全福淮膝綿耆川貝石英茯苓冬蟲冬瓜子白芍會絡蜜炙枇杷葉案左咳嗽綿延背脊痠痛惡風神倦春季雖為失血血尚不多脈見細弦脫力內傷氣與陰兩為不足治以和養沙參川貝全福冬瓜子耆皮杏仁石英蛤殼血燕根淮膝會絡冬蟲絲絡杜仲案左咳嗽未減夜重於日痰多氣怯關係者形寒潮熱營衛之傷最難調護脈芤擬以和養沙參甜杏全福白芍阿膠川貝石英茯苓百合冬蟲冬瓜子會絡枇杷葉紅棗案左肝升太過肺降無權咳嗆綿延氣逆無痰兩脅每每引痛時時面部火升勢防天熱失血脈息沉弦治以清降沙參甜杏仁白芍蛤殼全福川貝母淮膝石英猩絳冬瓜子冬蟲會紅絲瓜絡肺露案左酒客鬱熱肝肺兩臟受傷咳血雖平兩脅尚為引疼治以和養北沙參燕根旱蓮甜杏全福冬蟲女珍川貝猩絳淮膝蛤殼會絡絲瓜絡案左因感起咳咳而無痰脅痛氣逆脈息細弦最防失血成勞擬以和養沙參甜杏白芍淮膝全福川貝冬蟲蛤殼猩絳冬瓜子燕根會絡蜜炙枇葉絲瓜絡案左脈左部弦大甚於關位屬春令應肝肝邪為熾加以素有遺泄水不涵木厥陰更為失養以致有升少降上爍嬌臟咳嗆雖屬不甚行動即為氣逆關係又在失血血發連次所吐甚紅由陰傷氣氣分漸為不調食後每每腹脹防進而足腫便溏即屬過中難治擬以和養沙參川貝白芍金斛燕根冬瓜子旱蓮石英冬蟲全福女珍蛤殼紅棗藕節如血來以墨染白絹三寸一方化灰待冷沖服案孔左失血漸止痰中尚為帶溢肝肺兩虛肺失降為咳嗆肝不和為脅痛脈見數滑青年最防入損再從清養沙參甜杏全福白芍冬蟲川貝石英川斛燕根旱蓮蛤殼茜根藕節肺露復失血已平肝升肺降仍屬未知痰膠氣逆咳嗆之勢夜甚於日脈見數滑再從清養兼和中以開胃納沙參甜杏全福白芍冬蟲川貝石英生熟穀芽元斛冬瓜子蛤殼會白紅棗肺露案梅左連年見血每每逢節而發發時或多或少整口色鮮由陽明損及肝肺肺不降為咳嗆肝不和為脅痛漸至音嘶盜汗潮熱形寒關係尤在便溏有損而過中之勢脈息弦滑擬以和養沙參元斛白芍蠶繭炭冬蟲全福川貝扁豆衣燕根石英百藥煎炙草紅棗鮮藕肉一兩案王左英發太早濕熱下注肛癰未斂內管漸成肺腸為表裡咳嗽綿延痰薄且黏夏令防失血成損治以清養急和左脈弦數沙參杏仁全福象牙屑冬蟲川貝石英冬瓜子燕根蛤殼川斛新會紅枇杷葉紅棗肺露案左早有遺泄近發失血遂致肝升肺降兩為失司咳嗽氣逆窮則傷腎諸虛雜出形寒潮熱咽乾艱寐肢腰痠楚盜汗淋漓脈見芤數右部為甚治以和養沙參元斛全福白薇冬蟲川貝石英蘇子燕根白芍新會茯苓枇杷葉藕節豆花露復遺泄不發失血亦不見重惟關係者尤在咳嗽氣怯喘須高枕痰多成罐營衛早為偏勝形寒潮熱且又出汗心煩神倦脈見細軟根本大傷夏令能否有減無損再擬甘平清降吉林須淡秋石八分泡湯煎冬蟲全福白芍沙參燕根石英茯苓綿耆鹽水炒淮麥川貝蛤殼枇杷葉紅棗會絡三十七嘔血案沈左跌僕受傷左脅迸痛嘔血又發脈沉弦治以和降降香寄生當歸杜仲仙鶴草會絡丹參膝炭三七白芍川斷鹿銜藕節蠶繭炭三十八吐血案左勃然吐血兩脅作痛脈見沉弦治以和降降香全福白芍膝炭歸鬚猩絳旱蓮茯苓仙鶴草丹參竹三七會絡絲瓜絡藕節案左血隨氣沸勃然吐血當脘發迸兩脅引痛內傷胃絡顯然脈見沉弦治以和降降香全福白芍膝炭歸鬚猩絳鹿銜茯苓仙鶴草丹參參三七會絡藕節絲瓜絡案左無端失血整口色鮮由胃絡而傷肝肺漸加咳嗽脈見芤大治以清降沙參仙鶴草杏仁淮膝三七女珍川貝蛤殼旱蓮茜根冬瓜子會絡藕肉兩許案左吐血連日未止由陽明而傳肝肺漸加咳嗽脈見芤弦治以和降降香杏仁淮膝全福仙鶴草石英茯苓川貝三七白芍會絡冬瓜子藕節案左咳嗆失血內熱脈數治以清降南沙參旱蓮杏仁冬瓜子竹三七女珍川貝青蒿子仙鶴草茜根川斛蛤殼藕節案左陽明為多氣多血之經血隨氣沸或紫或紅皆屬整口久防損及肝肺漸加咳嗽脈見弦數治以和降細生地旱蓮草白芍茯苓川石斛女珍子蛤殼歸鬚參三七盆秋石仙鶴草鮮藕汁一小杯案左素有遺泄以致龍相失潛燥灼之勢上衝於胃陽明之血隨氣火上騰每發血時心煩神躁坐立不安熱迫營陰氣火用事脈見芤弦治以和養細生地白芍元斛生熟穀芽煨石膏旱蓮木神淮膝沙參丹參蓮鬚會皮藕節紅棗三十九口鼻血案左咳嗆失血口鼻俱溢脈見弦滑治以清降沙參杏仁旱蓮白芍茅花川貝茜根冬瓜子三七會絡山茶花一錢五分蛤殼藕節復口鼻之血再和咳嗽脈細沙參川貝旱蓮茜根蛤殼會絡杏仁冬瓜子茅花白芍川斛藕節四十痞塊案左腹痞脹滿陰陽絡兩為受傷鼻血便血形黃內熱脈見弦滑治以疏和白朮茅花香附川楝鱉甲大腹丹參九香建曲楂炭新會白芍側柏砂仁紅棗案陸左腹痞攻脹陰陽絡傷吐血雖止便血未除脈見沉弦再以調降白朮大腹川斷川楝赤曲香附丹參香蟲楂炭煨木香新會白芍炒側柏案柴左腹痞肢腫形黃神倦脈見細弦陰陽絡傷鼻血雖止便血未除治以疏和白朮大腹香附白芍建曲防己川楝丹參楂炭萆薢九香葫蘆巴西砂仁案左左脅之下迸結若痞脫力氣痹治以疏和吳萸香附獨活杜仲白芍川楝寄生當歸建曲九香青木香新會絲瓜絡案左早有腹痞或痛或脹肝脾內傷治以疏和吳萸川楝佛香香附白芍九香茯苓大腹建曲陳櫞丹參新會砂仁案陳左腹痛痞攻便血澼澼脈息細弦治以疏和香附炮薑吳萸佛柑建曲地榆白芍川楝楂炭大腹煨木香新會砂仁案周左便血體肝脾早傷右腹結痞攻動作痛痛連腰部脈來細軟治以溫通香附吳萸川楝腹皮建曲白芍九香川斷楂炭新會桑梗丹參砂仁案左腹痛痞攻內熱肌灼脈數擬清陰調中鱉甲川楝大腹雞金志曲九香陳櫞白芍銀柴香附新會茯苓砂仁案左腹痞痛脹咳嗆肢腫屬舊傷新邪肺脾同病脈見細弦擬以疏和吳萸香附蘇子木防己白芍大腹款冬萆薢建曲新會茯苓米仁砂仁案顧左腹痞作脹洞泄無度舊傷新邪再從疏和白朮大腹吳萸川楝香附茯苓白芍九蟲煨木香新會建曲車前砂仁案左中焦氣痹積痰蓄飲當脘屢屢作痛兩痞交攻溏泄亦因之而發脈見沉弦久防痰飲常擾再加嘔吐擬以溫通半夏茯神川楝陳櫞香附遠志香蟲白芍煨木香澄茄志曲新會砂仁薑竹茹案右腹痞便溏經事應通未通轉為鼻血屢溢脈見沉弦治以疏和香附建曲大腹茺蔚川楝丹參側柏延胡香蟲白芍新會枳殼砂仁案左肝脾肺三者俱傷肝為脅痛脾為痞脹肺為咳嗆脈見沉弦治以疏和香附陳櫞蘇子大腹川楝建曲款冬白歸鬚香蟲白芍新會猩絳砂仁絲瓜絡案右痞痛舊根近發連及腰脅脈見沉弦治以疏和鹿銜猩絳丹參杜仲當歸香附白芍香蟲寄生川楝會絡志曲絲瓜絡砂仁四十一胸痹案袁左痰飲內阻晨起咳嗽胸痹氣逆痰沫不爽脈見細弦擬以和降瓜蔞仁全福半夏茯苓薤白頭石英川貝淮膝蘇子款冬會紅摩沖沉香一分案右肝為之升肺失其降肝肺兩病此平彼作咳嗽頻仍痰色不一金不制木肝邪益熾胸痹脘滿痰沫湧吐咽喉且痛脈見沉弦擬以通降瓜蔞仁全福半夏白芍薤白頭代赭川貝木神蘇子瓦楞新會佛花枇杷葉薑竹茹青鉛案方左早有失血去年復發近日又有胸痹不舒少腹結痞肝肺久為受傷脘宇窒塞略有咳嗽燔灼之令恐血再來脈風細弦治以和降瓜蔞仁全福杏仁冬瓜子薤白頭石英川貝紫菀降香冬蟲蛤殼會絡絲瓜絡枇杷葉四十二肺脾病案右咳嗆略減轉為腹痛多利有上損過中之勢當肺脾養和並顧失血沙參全福川貝川斛冬蟲紫石英冬瓜子會白扁豆衣白芍炙甘草炒穀芽紅棗案右吐血咳嗽近來雖不加重病情雜出潮熱盜汗胃納甚微大便多次上損及脾月事漸枯下損過胃脾胃兩傷過中最險脈見細軟舌光屬虛多邪少治以和養於術元斛粟殼川貝夏曲補骨扁豆衣淮麥白芍菟絲茯苓新會紅棗案左肺脾兩傷上為咳嗽下為便血漸至肉落納少形寒潮熱勢將由傷成勞脈見弦滑治以和養黨參杜仲蘇子茯苓赤曲川斷款冬白芍楂炭丹參紫菀陳皮紅棗扁柏
